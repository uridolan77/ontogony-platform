groups:
  - name: ontogony-observability
    interval: 30s
    rules:
      - alert: OntogonyHttp5xxRatioHigh
        expr: |
          (
            sum(rate(ontogony_http_server_error_count_total[5m]))
            /
            clamp_min(sum(rate(ontogony_http_server_request_count_total[5m])), 1)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Ontogony HTTP 5xx ratio is above 5%"
          description: "The error ratio has exceeded 5% for 10 minutes."

      - alert: OntogonyIntegrationErrorsBurst
        expr: sum(rate(ontogony_integration_error_count_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Outbound integration errors detected"
          description: "Integration error rate is above 1 error/sec over 5 minutes."

      - alert: OntogonyEventDispatchFailures
        expr: sum(rate(ontogony_event_dispatch_failure_count_total[5m])) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Event dispatch failures observed"
          description: "One or more event handlers are failing continuously."
