name: System cohesion scheduled

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Cohesion mode
        default: MovingMain
        type: choice
        options: [MovingMain, Locked, CurrentWorkspace]
      include_streaming:
        description: Include streaming smoke
        default: true
        type: boolean
      include_capacity_baseline:
        description: Include Conexus capacity baseline
        default: true
        type: boolean
      include_restart_survival:
        description: Include restart survival
        default: true
        type: boolean

permissions:
  contents: read

env:
  PSStyle_OutputRendering: PlainText
  ARTIFACT_RETENTION_DAYS: "30"

jobs:
  full-system-cohesion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Allagma
        uses: actions/checkout@v4
        with:
          path: allagma-dotnet
          fetch-depth: 0

      - name: Checkout Platform
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ontogony-platform
          path: ontogony-platform
          ref: main

      - name: Checkout Kanon
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kanon-dotnet
          path: kanon-dotnet
          ref: main
          token: ${{ secrets.ONTOGONY_CROSS_REPO_CHECKOUT_TOKEN }}

      - name: Checkout Conexus
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/conexus-dotnet
          path: conexus-dotnet
          ref: main
          token: ${{ secrets.ONTOGONY_CROSS_REPO_CHECKOUT_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: allagma-dotnet/global.json

      - name: Run scheduled system cohesion
        shell: pwsh
        working-directory: allagma-dotnet
        run: |
          $mode = "${{ inputs.mode }}"
          if ([string]::IsNullOrWhiteSpace($mode)) { $mode = "MovingMain" }
          ./scripts/release/run-scheduled-system-cohesion.ps1 `
            -Mode $mode `
            -IncludeStreaming:${{ inputs.include_streaming || true }} `
            -IncludeCapacityBaseline:${{ inputs.include_capacity_baseline || true }} `
            -IncludeRestartSurvival:${{ inputs.include_restart_survival || true }}

      - name: Upload cohesion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-cohesion-scheduled
          path: allagma-dotnet/artifacts/system-cohesion-scheduled/
          if-no-files-found: ignore
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
