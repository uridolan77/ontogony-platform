name: Runtime release gate

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Release identifier
        required: true
        default: SYSTEM-ALPHA-007
      mode:
        description: Locked for release evidence; ExpectedRefs for drift
        required: true
        default: Locked
        type: choice
        options:
          - Locked
          - ExpectedRefs

permissions:
  contents: read
  actions: read

env:
  PSStyle_OutputRendering: PlainText
  ARTIFACT_RETENTION_DAYS: "30"

jobs:
  runtime-release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Platform
        uses: actions/checkout@v4
        with:
          path: ontogony-platform
          fetch-depth: 0

      - name: Checkout Allagma for runtime lock
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/allagma-dotnet
          path: release-workspace/allagma-dotnet
          ref: main
          token: ${{ secrets.ONTOGONY_CROSS_REPO_CHECKOUT_TOKEN }}
          fetch-depth: 0

      - name: Checkout Kanon
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kanon-dotnet
          path: release-workspace/kanon-dotnet
          ref: main
          token: ${{ secrets.ONTOGONY_CROSS_REPO_CHECKOUT_TOKEN }}
          fetch-depth: 0

      - name: Checkout Conexus
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/conexus-dotnet
          path: release-workspace/conexus-dotnet
          ref: main
          token: ${{ secrets.ONTOGONY_CROSS_REPO_CHECKOUT_TOKEN }}
          fetch-depth: 0

      - name: Copy Platform into release workspace
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force ontogony-platform release-workspace/ontogony-platform

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: release-workspace/allagma-dotnet/global.json

      - name: Run locked runtime release gate
        shell: pwsh
        working-directory: ontogony-platform
        run: |
          ./scripts/release/run-locked-runtime-release-gate.ps1 `
            -ReleaseId "${{ inputs.release_id }}" `
            -Mode "${{ inputs.mode }}" `
            -WorkspaceRoot "${{ github.workspace }}/release-workspace"

      - name: Upload runtime release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-release-evidence-${{ inputs.release_id }}
          path: ontogony-platform/artifacts/releases/${{ inputs.release_id }}/
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
