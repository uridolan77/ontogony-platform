name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ontogony
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ontogony"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      ONTOGONY_POSTGRES_TEST_CONNECTION: Host=localhost;Port=5432;Database=ontogony;Username=postgres;Password=postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore Ontogony.Platform.sln
      - name: Build
        run: dotnet build Ontogony.Platform.sln --no-restore
      - name: Test
        run: dotnet test Ontogony.Platform.sln --no-build --collect:"XPlat Code Coverage"
      - name: Validate docs links
        shell: pwsh
        run: ./scripts/validate-docs-links.ps1
      - name: Validate docs API names
        shell: pwsh
        run: ./scripts/validate-docs-api-names.ps1
      - name: Pack (version gate)
        env:
          PACKAGE_VERSION: 0.2.0
        shell: pwsh
        run: ./scripts/pack-all.ps1 -NoBuild
      - name: Generate package manifest
        env:
          PACKAGE_VERSION: 0.2.0
        shell: pwsh
        run: ./scripts/generate-package-manifest.ps1 -PackageVersion "0.2.0"
