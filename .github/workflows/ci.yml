name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore Ontogony.Platform.sln
      - name: Build
        run: dotnet build Ontogony.Platform.sln --no-restore
      - name: Test
        run: dotnet test Ontogony.Platform.sln --no-build --collect:"XPlat Code Coverage"
