name: release-packages

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.3.0)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ontogony
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ontogony"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      ONTOGONY_POSTGRES_TEST_CONNECTION: Host=localhost;Port=5432;Database=ontogony;Username=postgres;Password=postgres
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git log in manifest

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            # Extract from tag (e.g., refs/tags/v0.3.0 -> 0.3.0)
            $tag = "${{ github.ref }}"
            if ($tag -match "refs/tags/v([0-9]+\.[0-9]+\.[0-9]+.*)") {
              $version = $matches[1]
            } else {
              throw "Could not determine version from tag or input"
            }
          }
          Write-Host "Version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8 -Append

      - name: Restore
        run: dotnet restore Ontogony.Platform.sln

      - name: Build
        run: dotnet build Ontogony.Platform.sln --no-restore -c Release

      - name: Test
        run: dotnet test Ontogony.Platform.sln --no-build -c Release

      - name: Validate docs links
        shell: pwsh
        run: ./scripts/validate-docs-links.ps1

      - name: Validate docs API names
        shell: pwsh
        run: ./scripts/validate-docs-api-names.ps1

      - name: Validate AI runtime boundaries (AI.Contracts sources)
        shell: pwsh
        run: ./scripts/validate-ai-runtime-boundaries.ps1

      - name: Validate shipping inventory (src package + README counts)
        shell: pwsh
        run: ./scripts/validate-shipping-inventory.ps1

      - name: Validate AI runtime docs (banned API strings)
        shell: pwsh
        run: ./scripts/validate-ai-runtime-docs.ps1

      - name: Validate package levels (Ontogony ProjectReferences)
        shell: pwsh
        run: ./scripts/validate-package-levels.ps1

      - name: Validate dependency baseline (Microsoft.Extensions line + global.json)
        shell: pwsh
        run: ./scripts/validate-dependency-baseline.ps1

      - name: Validate Conexus consumer baseline (readiness vs Directory.Build.targets)
        shell: pwsh
        run: ./scripts/validate-conexus-consumer-baseline-alignment.ps1

      - name: Validate CHANGELOG
        shell: pwsh
        run: ./scripts/validate-changelog.ps1 -PackageVersion "${{ steps.version.outputs.version }}" -Strict

      - name: Clear package output
        shell: pwsh
        run: |
          if (Test-Path artifacts/packages) {
            Remove-Item artifacts/packages -Recurse -Force
          }

      - name: Pack packages
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        shell: pwsh
        run: ./scripts/pack-all.ps1 -NoBuild -IncludeSymbols

      - name: Generate package manifest
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        shell: pwsh
        run: ./scripts/generate-package-manifest.ps1 -PackageVersion "${{ steps.version.outputs.version }}"

      - name: Conexus package consumer (restore + build from local .nupkg)
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet restore examples/ConexusDotNetPackageSmoke/ConexusDotNetPackageSmoke.csproj -p:OntogonyPackageVersion=$PACKAGE_VERSION
          dotnet build examples/ConexusDotNetPackageSmoke/ConexusDotNetPackageSmoke.csproj --no-restore -c Release -p:OntogonyPackageVersion=$PACKAGE_VERSION

      - name: Publish to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgs = Get-ChildItem "artifacts/packages/*.nupkg" | Where-Object { $_.Name -notlike "*.symbols.nupkg" }
          foreach ($p in $pkgs) {
            Write-Host "Pushing $($p.Name)..."
            dotnet nuget push $p.FullName --source $env:NUGET_SOURCE --api-key $env:GITHUB_TOKEN --skip-duplicate
            if ($LASTEXITCODE -ne 0) { throw "NuGet push failed for $($p.Name) (exit $LASTEXITCODE)" }
          }
          $ErrorActionPreference = 'Continue'
          $snupkgs = @(Get-ChildItem "artifacts/packages/*.snupkg" -ErrorAction SilentlyContinue)
          foreach ($s in $snupkgs) {
            Write-Host "Pushing $($s.Name) (best-effort; release does not fail if symbol feed rejects)..."
            dotnet nuget push $s.FullName --source $env:NUGET_SOURCE --api-key $env:GITHUB_TOKEN --skip-duplicate 2>&1 | Write-Host
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Symbol package push failed for $($s.Name) (exit $LASTEXITCODE). .snupkg remains in artifacts and GitHub Release attachments."
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
            PACKAGE_MANIFEST.json
          retention-days: 90
          if-no-files-found: error

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: PACKAGE_MANIFEST.json
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
            PACKAGE_MANIFEST.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
