name: Dependency submission

# Populates GitHub Dependency graph for NuGet so Dependency review can diff PRs against main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore (ensures assets are present for submission)
        run: dotnet restore Ontogony.Platform.sln

      - uses: actions/dependency-submission-action@v4
