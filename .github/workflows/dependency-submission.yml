name: Dependency submission

# Populates GitHub Dependency graph for NuGet so Dependency review can diff PRs against main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore (ensures assets are present for submission)
        run: dotnet restore Ontogony.Platform.sln

      # `actions/dependency-submission-action` is not a published repo; use GitHub Advanced Security component detection for NuGet graph submission.
      # v0.0.5 threw TypeError on null package URLs; v0.1.3 includes null-safety fixes (see PLAT-NP-003 evidence doc).
      - uses: advanced-security/component-detection-dependency-submission-action@v0.1.3
