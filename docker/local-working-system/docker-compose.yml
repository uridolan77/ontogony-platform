services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ontogony_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ontogony_admin_pw}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - ontogony_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ontogony_admin} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  kanon-api:
    build:
      context: ../../../kanon-dotnet
      args:
        EXTRA_CA_CERT_BASE64: ${DOCKER_EXTRA_CA_CERT_BASE64:-}
      additional_contexts:
        ontogony_platform: ../../../ontogony-platform
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      Kanon__Persistence__Mode: ${KANON_PERSISTENCE_MODE:-Postgres}
      Kanon__Persistence__Postgres__ConnectionString: ${KANON_POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=kanon_local;Username=kanon_local;Password=kanon_local_pw}
      Kanon__Persistence__Postgres__ApplyMigrationsOnStartup: ${KANON_APPLY_MIGRATIONS_ON_STARTUP:-true}
      Kanon__Cors__Enabled: ${KANON_CORS_ENABLED:-true}
      Kanon__Cors__AllowedOrigins__0: ${FRONTEND_CORS_ORIGIN_LOCALHOST:-http://localhost:5175}
      Kanon__Cors__AllowedOrigins__1: ${FRONTEND_CORS_ORIGIN_LOOPBACK:-http://127.0.0.1:5175}
      Kanon__ConexusAssistance__Enabled: ${KANON_CONEXUS_ASSISTANCE_ENABLED:-true}
      Kanon__ConexusAssistance__BaseUrl: ${KANON_CONEXUS_ASSISTANCE_BASE_URL:-http://conexus-api:8080}
      Kanon__ConexusAssistance__ProjectApiKey: ${CONEXUS_PROJECT_API_KEY:-cx-dev-key-change-me}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4317}
      OTEL_SERVICE_NAME: ${KANON_OTEL_SERVICE_NAME:-kanon-api}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=development}
    ports:
      - "${KANON_HOST_PORT:-5081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  conexus-api:
    build:
      context: ../../../conexus-dotnet
      args:
        EXTRA_CA_CERT_BASE64: ${DOCKER_EXTRA_CA_CERT_BASE64:-}
      additional_contexts:
        ontogony_platform: ../../../ontogony-platform
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__ConexusPostgres: ${CONEXUS_POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=conexus_local;Username=conexus_local;Password=conexus_local_pw}
      CONEXUS_DEV_PROJECT_API_KEY: ${CONEXUS_DEV_PROJECT_API_KEY:-cx-dev-key-change-me}
      CONEXUS_ADMIN_API_KEY: ${CONEXUS_ADMIN_API_KEY:-cx-conexus-admin-dev}
      CONEXUS_REAL_PROVIDER_ENABLED: ${CONEXUS_REAL_PROVIDER_ENABLED:-false}
      CONEXUS_REAL_PROVIDER_NAME: ${CONEXUS_REAL_PROVIDER_NAME:-}
      CONEXUS_REAL_PROVIDER_MODEL: ${CONEXUS_REAL_PROVIDER_MODEL:-}
      CONEXUS_REAL_PROVIDER_MAX_CALLS: ${CONEXUS_REAL_PROVIDER_MAX_CALLS:-3}
      CONEXUS_REAL_PROVIDER_MAX_OUTPUT_TOKENS: ${CONEXUS_REAL_PROVIDER_MAX_OUTPUT_TOKENS:-256}
      CONEXUS_PROVIDER_OPENAI_API_KEY: ${CONEXUS_PROVIDER_OPENAI_API_KEY:-}
      Conexus__Cors__Enabled: ${CONEXUS_CORS_ENABLED:-true}
      Conexus__Cors__AllowedOrigins__0: ${FRONTEND_CORS_ORIGIN_LOCALHOST:-http://localhost:5175}
      Conexus__Cors__AllowedOrigins__1: ${FRONTEND_CORS_ORIGIN_LOOPBACK:-http://127.0.0.1:5175}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4317}
      OTEL_SERVICE_NAME: ${CONEXUS_OTEL_SERVICE_NAME:-conexus-api}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=development}
    ports:
      - "${CONEXUS_HOST_PORT:-5082}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-ec",
          "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /health/live HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; IFS= read -r line <&3; [[ \"$$line\" == *\"200\"* ]]",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  aisthesis-api:
    build:
      context: ../../../aisthesis-dotnet
      args:
        EXTRA_CA_CERT_BASE64: ${DOCKER_EXTRA_CA_CERT_BASE64:-}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__Aisthesis: ${AISTHESIS_POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=aisthesis_local;Username=aisthesis_local;Password=aisthesis_local_pw}
      AISTHESIS_RequireServiceToken: ${AISTHESIS_REQUIRE_SERVICE_TOKEN:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4317}
      OTEL_SERVICE_NAME: ${AISTHESIS_OTEL_SERVICE_NAME:-aisthesis-api}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=development}
    ports:
      - "${AISTHESIS_HOST_PORT:-5084}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  metabole-api:
    build:
      context: ../../../metabole-dotnet
      args:
        EXTRA_CA_CERT_BASE64: ${DOCKER_EXTRA_CA_CERT_BASE64:-}
      additional_contexts:
        ontogony_platform: ../../../ontogony-platform
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      Metabole__Storage: ${METABOLE_STORAGE_MODE:-Postgres}
      Metabole__Postgres__Enabled: ${METABOLE_POSTGRES_ENABLED:-true}
      Metabole__Postgres__MigrationMode: ${METABOLE_POSTGRES_MIGRATION_MODE:-Apply}
      Metabole__Postgres__Credentials__local-dev-metabole-postgres: ${METABOLE_POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=metabole_local;Username=metabole_local;Password=metabole_local_pw}
      Metabole__Kanon__Enabled: ${METABOLE_KANON_ENABLED:-true}
      Metabole__Kanon__Mode: ${METABOLE_KANON_MODE:-Http}
      Metabole__Kanon__BaseUrl: ${METABOLE_KANON_INTERNAL_BASE_URL:-http://kanon-api:8080}
      Metabole__Kanon__ServiceToken: ${KANON_SERVICE_TOKEN:-kanon-dev-service-token-change-in-production}
      Metabole__Conexus__Enabled: ${METABOLE_CONEXUS_ENABLED:-true}
      Metabole__Conexus__Mode: ${METABOLE_CONEXUS_MODE:-Http}
      Metabole__Conexus__BaseUrl: ${METABOLE_CONEXUS_INTERNAL_BASE_URL:-http://conexus-api:8080}
      Metabole__Conexus__ApiKey: ${CONEXUS_PROJECT_API_KEY:-cx-dev-key-change-me}
      Metabole__Auth__Enabled: ${METABOLE_AUTH_ENABLED:-false}
      Metabole__Auth__DevelopmentAllowAnonymous: ${METABOLE_AUTH_DEVELOPMENT_ALLOW_ANONYMOUS:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4317}
      OTEL_SERVICE_NAME: ${METABOLE_OTEL_SERVICE_NAME:-metabole-api}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=development}
    ports:
      - "${METABOLE_HOST_PORT:-5085}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kanon-api:
        condition: service_started
      conexus-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  allagma-api:
    build:
      context: ../../../allagma-dotnet
      args:
        EXTRA_CA_CERT_BASE64: ${DOCKER_EXTRA_CA_CERT_BASE64:-}
      additional_contexts:
        ontogony_platform: ../../../ontogony-platform
        kanon_dotnet: ../../../kanon-dotnet
        conexus_dotnet: ../../../conexus-dotnet
        metabole_dotnet: ../../../metabole-dotnet
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      Allagma__Persistence__Mode: ${ALLAGMA_PERSISTENCE_MODE:-Postgres}
      Allagma__Evaluation__ManualWriteEnabled: ${ALLAGMA_MANUAL_EVAL_WRITE_ENABLED:-true}
      ConnectionStrings__Allagma: ${ALLAGMA_POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=allagma_local;Username=allagma_local;Password=allagma_local_pw}
      Kanon__BaseUrl: ${KANON_INTERNAL_BASE_URL:-http://kanon-api:8080}
      Conexus__BaseUrl: ${CONEXUS_INTERNAL_BASE_URL:-http://conexus-api:8080}
      Conexus__ProjectApiKey: ${CONEXUS_PROJECT_API_KEY_FOR_ALLAGMA:-cx-dev-key-change-me}
      Conexus__AdminApiKey: ${CONEXUS_ADMIN_API_KEY:-cx-conexus-admin-dev}
      Allagma__Authentication__ServiceToken: ${ALLAGMA_SERVICE_TOKEN:-allagma-dev-service-token-change-in-production}
      Allagma__Downstream__Kanon__ServiceToken: ${KANON_SERVICE_TOKEN:-kanon-dev-service-token-change-in-production}
      Allagma__Cors__Enabled: ${ALLAGMA_CORS_ENABLED:-true}
      Allagma__Cors__AllowedOrigins__0: ${FRONTEND_CORS_ORIGIN_LOCALHOST:-http://localhost:5175}
      Allagma__Cors__AllowedOrigins__1: ${FRONTEND_CORS_ORIGIN_LOOPBACK:-http://127.0.0.1:5175}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4317}
      OTEL_SERVICE_NAME: ${ALLAGMA_OTEL_SERVICE_NAME:-allagma-api}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=development}
    ports:
      - "${ALLAGMA_HOST_PORT:-5083}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kanon-api:
        condition: service_started
      conexus-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  ontogony-frontend:
    build:
      context: ../../../ontogony-frontend
      additional_contexts:
        ontogony_ui: ../../../ontogony-ui
        ontogony_agent_interaction: ../../../ontogony-platform/packages/ontogony-agent-interaction
      args:
        EXTRA_CA_CERT_BASE64: ${DOCKER_EXTRA_CA_CERT_BASE64:-}
        VITE_APP_VERSION: ${FRONTEND_VITE_APP_VERSION:-}
        VITE_GIT_SHA: ${FRONTEND_VITE_GIT_SHA:-local}
        VITE_BUILD_TIME: ${FRONTEND_VITE_BUILD_TIME:-}
    volumes:
      - ./generated/operator-runtime-config.json:/usr/share/nginx/html/operator-runtime-config.json:ro
    ports:
      - "${FRONTEND_HOST_PORT:-5175}:8080"
    depends_on:
      allagma-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  ontogony_postgres_data:
